<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Facturar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50">
<div th:replace="fragments/navbar :: navbar"></div>

<!-- Franja de error (inicialmente oculta) -->
<div id="errorBanner" class="bg-red-500 text-white px-4 py-3 text-center hidden">
    <span id="errorMessage">Error</span>
</div>

<div class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Productos -->
    <section class="bg-white rounded-2xl shadow p-4">
        <div class="flex items-center gap-2 mb-4">
            <h2 class="text-xl font-semibold">Productos</h2>
            <input class="ml-auto border rounded px-3 py-2 w-64" placeholder="Buscar..." oninput="filterCards(this.value)">
        </div>
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4" id="cards">
            <div th:each="p : ${products}" class="border rounded-xl p-4 hover:shadow">
                <div class="text-5xl text-gray-300 mb-2">🏷️</div>
                <div class="font-medium" th:text="${p.name}">Producto</div>
                <div class="text-sm text-gray-500" th:text="'Inv '+${p.quantity}">Disponible</div>
                <div class="text-lg font-bold mt-2" th:text="${formatCOP.apply(p.price)}">$0</div>
                <form th:action="@{/vista/vending/add/{id}(id=${p.proceeds_id})}" method="post" class="mt-3">
                    <button class="w-full bg-blue-600 text-white rounded-xl py-2">Agregar</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Carrito -->
    <section class="bg-white rounded-2xl shadow p-4">
        <h2 class="text-xl font-semibold mb-4">Factura de venta</h2>

        <!-- Cliente / Vendedor -->
        <div class="grid grid-cols-2 gap-3 mb-4">
            <select name="clientId" id="clientId" class="border rounded px-3 py-2">
                <option value="" selected>Consumidor final</option>
                <option th:each="c : ${clients}" th:value="${c.client_id}" th:text="${c.name}"></option>
            </select>
            <select name="employeeId" id="employeeId" class="border rounded px-3 py-2" required>
                <option value="" disabled selected>Seleccionar vendedor</option>
                <option th:each="e : ${employees}" th:value="${e.employee_id}" th:text="${e.name}"></option>
            </select>
        </div>

        <!-- Items -->
        <div class="divide-y">
            <div th:if="${#lists.isEmpty(cart)}" class="text-gray-400 text-center py-12">
                Aquí verás los productos que elijas
            </div>

            <div th:each="it : ${cart}" class="py-3 flex items-center">
                <div class="flex-1">
                    <div class="font-medium" th:text="${it.name}">Nombre</div>
                    <div class="text-sm text-gray-500" th:text="${it.qty} + ' × ' + ${formatCOP.apply(it.unitPriceCents)}"></div>
                </div>
                <div class="flex items-center gap-2">
                    <form th:action="@{'/vista/vending/dec/'+${it.proceedsId}}" method="post"><button class="px-2 py-1 border rounded">−</button></form>
                    <span th:text="${it.qty}">1</span>
                    <form th:action="@{'/vista/vending/inc/'+${it.proceedsId}}" method="post"><button class="px-2 py-1 border rounded">+</button></form>
                    <form th:action="@{'/vista/vending/remove/'+${it.proceedsId}}" method="post"><button class="px-2 py-1 border rounded text-red-600">✕</button></form>
                </div>
                <div class="w-28 text-right font-semibold" th:text="${formatCOP.apply(it.subtotalCents)}"></div>
            </div>
        </div>

        <!-- Totales -->
        <div class="mt-4 p-4 bg-gray-50 rounded-xl">
            <div class="flex justify-between">
                <span>Subtotal</span>
                <span th:text="${formatCOP.apply(cartTotal)}">$0</span>
            </div>
            <div class="flex justify-between text-lg font-bold mt-1">
                <span>Total</span>
                <span th:text="${formatCOP.apply(cartTotal)}">$0</span>
            </div>
        </div>

        <!-- Acciones -->
        <div class="mt-4 flex gap-3">
            <form th:action="@{/vista/vending/cancel}" method="post">
                <button class="flex-1 border rounded-xl py-3">Cancelar</button>
            </form>
            <button class="flex-1 bg-blue-600 text-white rounded-xl py-3" onclick="openPay()">Vender</button>
            <button type="button" onclick="history.back()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white rounded-xl py-3">Volver</button>
        </div>
        </div>
    </section>
</div>

<!-- Modal Pago -->
<div id="payModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">
    <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow">
        <h3 class="text-lg font-semibold mb-4">Pago</h3>
        <form id="payForm" th:action="@{/vista/vending/confirm}" method="post" class="space-y-3">
            <input type="hidden" name="clientId" id="payClient">
            <input type="hidden" name="employeeId" id="payEmployee">

            <!-- Mostrar información de la venta -->
            <div class="bg-gray-50 p-3 rounded">
                <div class="text-sm">
                    <div><strong>Cliente:</strong> <span id="selectedClient">Consumidor final</span></div>
                    <div><strong>Vendedor:</strong> <span id="selectedEmployee">-</span></div>
                </div>
            </div>

            <label class="block">
                <span class="text-sm text-gray-600">Total</span>
                <input readonly class="w-full border rounded px-3 py-2 bg-gray-100" id="payTotal" value="0">
            </label>
            <label class="block">
                <span class="text-sm text-gray-600">Paga con</span>
                <input name="paidCents" id="paidCents" type="number" min="0" class="w-full border rounded px-3 py-2" oninput="calcChange()" required>
            </label>
            <div class="flex justify-between font-semibold">
                <span>Cambio</span>
                <span id="change">$0</span>
            </div>
            <div class="flex gap-2 pt-2">
                <button type="button" onclick="closePay()" class="flex-1 border rounded-xl py-2">Cerrar</button>
                <button type="submit" class="flex-1 bg-emerald-600 text-white rounded-xl py-2" onclick="confirmSale(event)">Confirmar</button>
            </div>
        </form>
    </div>
</div>

<script>
    function formatCOP(amount) {
        return new Intl.NumberFormat('es-CO', {
            style: 'currency',
            currency: 'COP',
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        }).format(amount);
    }

    function showError(message) {
        const banner = document.getElementById('errorBanner');
        const messageElement = document.getElementById('errorMessage');
        messageElement.textContent = message;
        banner.classList.remove('hidden');

        // Auto-ocultar después de 5 segundos
        setTimeout(() => {
            banner.classList.add('hidden');
        }, 5000);
    }

    function openPay(){
        // Verificar que hay empleado seleccionado
        const employeeSelect = document.getElementById('employeeId');
        if (!employeeSelect.value || employeeSelect.value === '') {
            showError('Por favor selecciona un vendedor antes de continuar');
            employeeSelect.focus();
            return;
        }

        // Verificar que hay productos en el carrito
        const cartTotal = parseInt("[[${cartTotal}]]") || 0;
        if (cartTotal <= 0) {
            showError('El carrito está vacío. Agrega productos antes de vender');
            return;
        }

        // Obtener valores
        const clientSelect = document.getElementById('clientId');
        const clientValue = clientSelect.value;
        const employeeValue = employeeSelect.value;

        // Establecer valores en el modal
        document.getElementById('payClient').value = clientValue;
        document.getElementById('payEmployee').value = employeeValue;

        // Mostrar información en el modal
        const clientText = clientSelect.options[clientSelect.selectedIndex].text;
        const employeeText = employeeSelect.options[employeeSelect.selectedIndex].text;

        document.getElementById('selectedClient').textContent = clientText;
        document.getElementById('selectedEmployee').textContent = employeeText;

        // Configurar total y pago
        document.getElementById('payTotal').value = formatCOP(cartTotal);
        document.getElementById('paidCents').value = cartTotal;
        document.getElementById('change').textContent = formatCOP(0);

        // Mostrar modal
        document.getElementById('payModal').classList.remove('hidden');
        document.getElementById('payModal').classList.add('flex');

        // Focus en el campo de pago
        document.getElementById('paidCents').focus();
        document.getElementById('paidCents').select();
    }

    function closePay(){
        document.getElementById('payModal').classList.add('hidden');
        document.getElementById('payModal').classList.remove('flex');
    }

    function calcChange(){
        const total = parseInt("[[${cartTotal}]]") || 0;
        const paid = parseInt(document.getElementById('paidCents').value || 0);
        const change = Math.max(0, paid - total);
        document.getElementById('change').textContent = formatCOP(change);
    }

    function confirmSale(event) {
        event.preventDefault();

        const total = parseInt("[[${cartTotal}]]") || 0;
        const paid = parseInt(document.getElementById('paidCents').value || 0);

        if (paid < total) {
            showError('El monto pagado no puede ser menor al total de la venta');
            return;
        }

        // Mostrar loading
        Swal.fire({
            title: 'Procesando venta...',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        // Enviar formulario
        const form = document.getElementById('payForm');
        const formData = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            body: formData
        })
            .then(response => {
                if (response.ok) {
                    // Venta exitosa
                    Swal.fire({
                        icon: 'success',
                        title: '¡Venta realizada exitosamente!',
                        text: 'La venta se ha registrado correctamente',
                        confirmButtonText: 'Ver ventas',
                        confirmButtonColor: '#10b981'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            window.location.href = '/vista/vending/lista';
                        }
                    });
                } else {
                    // Error en la venta
                    Swal.fire({
                        icon: 'error',
                        title: 'Error al procesar la venta',
                        text: 'Ocurrió un problema al registrar la venta. Inténtalo de nuevo.',
                        confirmButtonColor: '#ef4444'
                    });
                }
            })
            .catch(error => {
                console.error('Error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Error de conexión',
                    text: 'No se pudo conectar con el servidor. Verifica tu conexión.',
                    confirmButtonColor: '#ef4444'
                });
            });
    }

    function filterCards(q){
        q = q.toLowerCase();
        document.querySelectorAll('#cards > div').forEach(card=>{
            const name = card.querySelector('.font-medium').textContent.toLowerCase();
            card.style.display = name.includes(q) ? '' : 'none';
        });
    }
</script>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
