<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proveedores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white text-gray-800">
<div th:replace="fragments/navbar :: navbar"></div>


<div class="max-w-6xl mx-auto px-4 py-10">

    <!-- Título -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Proveedores</h1>

        <!-- Botón Agregar Cliente -->
        <a href="/vistaS/form"
           class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-full shadow text-sm font-medium transition">
            <i class="fas fa-plus"></i> Agregar proveedor
        </a>
    </div>

    <!-- Buscador -->
    <div class="mb-6">
        <div class="relative w-full">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
          <i class="fas fa-search"></i>
        </span>
            <input
                    type="text"
                    id="searchInput"
                    placeholder="Buscar proveedores..."
                    class="pl-10 w-full p-3 rounded-md border border-gray-300 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    onkeyup="filterSuppliers()"
            />
        </div>
    </div>

    <!-- Tabla de proveedores -->
    <div class="overflow-x-auto border border-gray-200 rounded-lg shadow-sm">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
            <thead class="bg-gray-50 text-gray-600 font-medium text-left">
            <tr>
                <th class="px-4 py-3">ID</th>
                <th class="px-4 py-3">Nombre</th>
                <th class="px-4 py-3">Teléfono</th>
                <th class="px-4 py-3">Email</th>
                <th class="px-4 py-3 text-center">Acciones</th>
            </tr>
            </thead>
            <tbody id="supplierTable" class="bg-white divide-y divide-gray-100">
            <tr th:each="supplier : ${supplier}" class="hover:bg-gray-50">
                <td class="px-4 py-3" th:text="${supplier.supplier_id}"></td>
                <td class="px-4 py-3" th:text="${supplier.name}"></td>
                <td class="px-4 py-3" th:text="${supplier.phone}"></td>
                <td class="px-4 py-3" th:text="${supplier.email}"></td>
                <td class="px-4 py-3 text-center whitespace-nowrap">
                    <a th:href="@{/vistaS/edit/{id}(id=${supplier.supplier_id})}"
                       class="inline-flex items-center px-3 py-1 text-sm text-blue-600 border border-blue-600 rounded-full hover:bg-blue-100 transition">
                        <i class="fas fa-edit mr-1"></i> Editar
                    </a>
                    <form th:action="@{/vistaS/delete/{id}(id=${supplier.supplier_id})}" method="post" class="inline delete-form">
                        <button type="submit"
                                class="inline-flex items-center px-3 py-1 text-sm text-red-600 border border-red-600 rounded-full hover:bg-red-100 transition ml-2">
                            <i class="fas fa-trash-alt mr-1"></i> Eliminar
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>



<div id="swalSuccess" th:if="${success}" th:data-msg="${success}" class="hidden"></div>

<!-- SweetAlert2 script -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/filters.js"></script>
<script src="/js/alerts.js"></script>
<script src="/js/delete.js"></script>


<div th:replace="fragments/footer :: footer"></div>



</body>
</html>
